<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Laudo de Inspecao Veicular">
    <meta name="theme-color" content="#2E3393">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Laudo Veicular">
    <link rel="apple-touch-icon" href="img/icon-192.png">
    <link rel="icon" type="image/png" href="img/icon-192.png">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Laudo de Inspecao Veicular</title>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo-area">
                <img src="img/logo.jpeg" alt="Logo da Empresa" class="header-logo">
            </div>
            <div class="header-content">
                <input type="text" id="companyName" class="company-name-input" placeholder="Nome da Empresa" value="Iguacu Reboque">
            </div>
            <button type="button" id="btnInstall" class="btn-install" style="display:none">📲 Instalar App</button>
        </header>

        <main class="form-container">
            <section class="form-section">
                <h2>Operador do Reboque</h2>
                <div class="form-field">
                    <label for="operador">Nome do Operador</label>
                    <input type="text" id="operador" class="input-field" placeholder="Ex: Joao Silva">
                </div>
            </section>

            <section class="form-section">
                <h2>Dados do Proprietario <span class="ai-badge">IA</span></h2>
                <div class="ai-capture-area">
                    <input type="file" id="photoDocProprietario" accept="image/*" capture="environment" style="display:none">
                    <button type="button" id="btnFotoDocProprietario" class="btn-ai-capture">📷 Fotografar documento</button>
                    <div id="previewDocProprietario" class="doc-preview"></div>
                    <button type="button" id="btnAnalisarProprietario" class="btn-ai-analyze" style="display:none">🤖 Processar com IA</button>
                    <div id="loadingProprietario" class="ai-loading">
                        <div class="ai-spinner"></div>
                        <span>Analisando documento...</span>
                    </div>
                </div>
                <div id="proprietarioFields" class="dynamic-fields"></div>
                <button type="button" id="manualProprietario" class="btn-manual">✏️ Preencher manualmente</button>
            </section>

            <section class="form-section">
                <h2>Dados do Veiculo <span class="ai-badge">IA</span></h2>

                <div class="car-visualization">
                    <div class="car-side">
                        <h3>Lateral Esquerda</h3>
                        <img src="img/ld%20esquedo.PNG" alt="Lateral Esquerda" class="car-diagram">
                        <div class="photo-upload">
                            <input type="file" id="photoLeft" accept="image/*" capture="environment" class="photo-input" data-side="left" style="display:none">
                            <button type="button" class="btn-photo" data-side="left">📷 Foto</button>
                            <div id="photoPreviewLeft" class="photo-preview"></div>
                        </div>
                    </div>
                    <div class="car-side">
                        <h3>Lateral Direita</h3>
                        <img src="img/ld%20direito.PNG" alt="Lateral Direita" class="car-diagram">
                        <div class="photo-upload">
                            <input type="file" id="photoRight" accept="image/*" capture="environment" class="photo-input" data-side="right" style="display:none">
                            <button type="button" class="btn-photo" data-side="right">📷 Foto</button>
                            <div id="photoPreviewRight" class="photo-preview"></div>
                        </div>
                    </div>
                    <div class="car-side">
                        <h3>Frente</h3>
                        <img src="img/frente.PNG" alt="Frente" class="car-diagram">
                        <div class="photo-upload">
                            <input type="file" id="photoFront" accept="image/*" capture="environment" class="photo-input" data-side="front" style="display:none">
                            <button type="button" class="btn-photo" data-side="front">📷 Foto</button>
                            <div id="photoPreviewFront" class="photo-preview"></div>
                        </div>
                    </div>
                    <div class="car-side">
                        <h3>Traseira</h3>
                        <img src="img/traseira.PNG" alt="Traseira" class="car-diagram">
                        <div class="photo-upload">
                            <input type="file" id="photoBack" accept="image/*" capture="environment" class="photo-input" data-side="back" style="display:none">
                            <button type="button" class="btn-photo" data-side="back">📷 Foto</button>
                            <div id="photoPreviewBack" class="photo-preview"></div>
                        </div>
                    </div>
                </div>

                <button type="button" id="btnAnalisarVeiculo" class="btn-ai-analyze btn-ai-analyze-full">🤖 Analisar veiculo com IA</button>
                <div id="loadingVeiculo" class="ai-loading">
                    <div class="ai-spinner"></div>
                    <span>Analisando veiculo...</span>
                </div>

                <div id="vehicleFields" class="dynamic-fields"></div>
                <div id="checklistContainer" class="dynamic-checklist"></div>
                <button type="button" id="manualVeiculo" class="btn-manual">✏️ Preencher manualmente</button>

                <div class="section-divider"></div>

                <h3 class="sub-section-title">Painel e Compartimentos</h3>
                <div class="panel-visualization">
                    <div class="car-side">
                        <h3>Luzes e Kilometragem</h3>
                        <div class="photo-upload">
                            <input type="file" id="photoPanelLights" accept="image/*" capture="environment" class="panel-photo-input" data-panel="lights" style="display:none">
                            <button type="button" class="btn-photo btn-panel-photo" data-panel="lights">📷 Foto do painel</button>
                            <div id="photoPreviewPanelLights" class="photo-preview"></div>
                        </div>
                    </div>
                    <div class="car-side">
                        <h3>Painel Total</h3>
                        <div class="photo-upload">
                            <input type="file" id="photoPanelFull" accept="image/*" capture="environment" class="panel-photo-input" data-panel="full" style="display:none">
                            <button type="button" class="btn-photo btn-panel-photo" data-panel="full">📷 Foto do painel</button>
                            <div id="photoPreviewPanelFull" class="photo-preview"></div>
                        </div>
                    </div>
                    <div class="car-side">
                        <h3>Porta-Malas</h3>
                        <div class="photo-upload">
                            <input type="file" id="photoTrunk" accept="image/*" capture="environment" class="panel-photo-input" data-panel="trunk" style="display:none">
                            <button type="button" class="btn-photo btn-panel-photo" data-panel="trunk">📷 Foto do porta-malas</button>
                            <div id="photoPreviewTrunk" class="photo-preview"></div>
                        </div>
                    </div>
                </div>

                <div class="section-divider"></div>

                <h3 class="sub-section-title">Fotos Adicionais</h3>
                <div id="extraPhotosContainer" class="extra-photos-grid"></div>
                <input type="file" id="extraPhotoInput" accept="image/*" capture="environment" style="display:none">
                <button type="button" id="btnAddExtraPhoto" class="btn-photo btn-add-extra">➕ Adicionar foto</button>
            </section>

            <section class="form-section">
                <h2>Observacoes</h2>
                <textarea id="observations" class="textarea-field" placeholder="Descreva qualquer anomalia, dano ou observacao importante..."></textarea>
            </section>

            <section class="form-section">
                <h2>Assinaturas</h2>
                <div class="signatures-container">
                    <div class="signature-box">
                        <label>Operador do Reboque</label>
                        <canvas id="sigOperador" class="signature-canvas"></canvas>
                        <button type="button" id="clearSigOperador" class="btn-secondary">Limpar</button>
                    </div>
                    <div class="signature-box">
                        <label>Proprietario do Veiculo</label>
                        <canvas id="sigProprietario" class="signature-canvas"></canvas>
                        <button type="button" id="clearSigProprietario" class="btn-secondary">Limpar</button>
                    </div>
                </div>
            </section>

            <section class="form-section action-buttons">
                <button type="button" id="saveDraftBtn" class="btn-secondary">💾 Salvar rascunho</button>
                <button type="button" id="loadDraftBtn" class="btn-secondary">📂 Novo laudo</button>
                <button type="button" id="generatePdfBtn" class="btn-primary">📄 Gerar PDF</button>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
        let deferredPrompt;
        const btnInstall = document.getElementById('btnInstall');
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;

        if (isIOS && !isStandalone) {
            btnInstall.style.display = '';
            btnInstall.addEventListener('click', () => {
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `<div class="modal-box">
                    <h3>Instalar no iPhone</h3>
                    <p>1. Toque no botão <strong>Compartilhar</strong> (ícone ⬆️) na barra do Safari<br><br>
                    2. Role para baixo e toque em <strong>"Adicionar à Tela de Início"</strong><br><br>
                    3. Toque em <strong>"Adicionar"</strong></p>
                    <button class="modal-close">Entendi</button>
                </div>`;
                overlay.querySelector('.modal-close').addEventListener('click', () => overlay.remove());
                overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
                document.body.appendChild(overlay);
            });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            btnInstall.style.display = '';
        });
        btnInstall.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
            btnInstall.style.display = 'none';
        });
        window.addEventListener('appinstalled', () => {
            btnInstall.style.display = 'none';
        });
    </script>
</body>
</html>
